controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    left_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    right_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_gripper_controller:
      type: position_controllers/GripperActionController

    mobile_base_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController


left_forward_position_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

left_forward_velocity_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity

left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 50.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

left_gripper_controller:
  ros__parameters:
    joint: openarm_left_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position


right_forward_position_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

right_forward_velocity_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity

right_joint_trajectory_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 50.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

right_gripper_controller:
  ros__parameters:
    joint: openarm_right_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position

mobile_base_controller:
  ros__parameters:
    wheel_names:
      - mobile_base_front_left_wheel_joint
      - mobile_base_front_right_wheel_joint
      - mobile_base_rear_left_wheel_joint
      - mobile_base_rear_right_wheel_joint
    wheel_offset: 0.7853981634
    robot_radius: 0.34
    wheel_radius: 0.075
    odom_frame_id: odom
    base_frame_id: mobile_base_link
    open_loop: true
    position_feedback: false
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    diagonal_covariance:
      pose: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
      twist: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
